name: ADR-0013 Independent Review

on:
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest tests.test_adr0013_independent_review -v
      - run: python scripts/adr0013_independent_review_check.py
      - run: python scripts/project_context_check.py
      - run: python scripts/project_state_transition_check.py
      - run: git diff --check
