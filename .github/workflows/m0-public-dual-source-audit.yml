name: M0 Public Dual-Source Audit

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: UTC start date for the 1h public audit profile
        required: true
        default: "2019-09-01"
      end_date:
        description: UTC end date; blank means yesterday
        required: false
        default: ""

jobs:
  public-dual-source-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run official public ZIP and REST audit
        id: audit
        continue-on-error: true
        env:
          START_DATE: ${{ inputs.start_date || '2019-09-01' }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          args=(
            --symbols BTCUSDT,ETHUSDT
            --interval 1h
            --start-date "$START_DATE"
            --execution-label hosted
            --evidence-out storage/logs/m0_dual_source_audit_evidence.json
            --out reports/m0/M0_DUAL_SOURCE_AUDIT_DIAGNOSTICS.md
          )
          if [[ -n "$END_DATE" ]]; then
            args+=(--end-date "$END_DATE")
          fi
          PYTHONPATH=src python3 scripts/m0_dual_source_audit.py "${args[@]}"

      - name: Upload sanitized reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-public-dual-source-audit-report
          path: reports/m0/M0_DUAL_SOURCE_AUDIT_DIAGNOSTICS.md
          if-no-files-found: error
          retention-days: 7

      - name: Preserve strict audit outcome
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        run: test "$AUDIT_OUTCOME" = success
