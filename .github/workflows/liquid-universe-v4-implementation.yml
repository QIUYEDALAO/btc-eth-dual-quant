name: Liquid Universe V4 Implementation Validate

on:
  pull_request:
  push:

jobs:
  liquid-universe-v4-implementation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate fixture-only V4 implementation
        run: bash scripts/liquid_universe_v4_implementation_validate.sh
