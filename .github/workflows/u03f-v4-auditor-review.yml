name: U03F V4 Auditor Review

on:
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      U03F_REQUIRE_TARGET_HEAD: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: git fetch origin +refs/pull/92/head:refs/remotes/origin/u03f-v4-auditor-reviewed-head
      - run: python -m pip install -e .
      - run: python scripts/u03f_v4_auditor_review_check.py
      - run: python -m unittest tests.test_u03f_v4_auditor_review -v
      - run: bash scripts/project_validate.sh
      - run: python -m compileall src scripts
      - run: python scripts/m0_secret_scan.py
      - run: git diff --check
