name: ADR-0014 Adoption Validate

on:
  pull_request:
  push:

jobs:
  adr0014-adoption:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Fetch frozen reviewed head
        run: git fetch origin 31c967c785128671769eb713baed265da8ae0f2a

      - name: Validate conditional adoption
        run: bash scripts/adr0014_adoption_validate.sh
