name: Liquid Universe Contract Validate
on:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m pip install -e .
      - run: bash scripts/liquid_universe_contract_validate.sh
