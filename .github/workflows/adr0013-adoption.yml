name: ADR-0013 Adoption

on:
  pull_request:
  push:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest tests.test_adr0013_draft_policy -v
      - run: python scripts/adr0013_conformance_check.py
      - run: python scripts/adr0013_independent_review_check.py
      - run: python scripts/project_context_check.py
      - run: python scripts/project_state_transition_check.py
      - run: git diff --check
