name: PR Selective Validate

on:
  pull_request:

concurrency:
  group: pr-selective-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  selective-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and validator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run project Gate and changed validators
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/pr_ci_selective_validate.sh
