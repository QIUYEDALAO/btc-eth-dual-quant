name: M0 Public Audit

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: UTC start date for the 1h audit profile
        required: true
        default: "2019-09-01"
      end_date:
        description: UTC end date; blank means yesterday
        required: false
        default: ""

jobs:
  public-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve public-data range
        id: range
        env:
          REQUESTED_END: ${{ inputs.end_date }}
        run: |
          if [[ -n "$REQUESTED_END" ]]; then
            end_date="$REQUESTED_END"
          else
            end_date="$(date -u -d yesterday +%F)"
          fi
          echo "end_date=$end_date" >> "$GITHUB_OUTPUT"

      - name: Pull public 1h audit profile
        env:
          START_DATE: ${{ inputs.start_date || '2019-09-01' }}
          END_DATE: ${{ steps.range.outputs.end_date }}
        run: |
          PYTHONPATH=src python3 scripts/m0_backfill_public.py \
            --symbols BTCUSDT,ETHUSDT \
            --interval 1h \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --limit 1000 \
            --max-pages 100 \
            --zip-fallback \
            --spot-base-url https://data-api.binance.vision \
            --report-path reports/m0/M0_PUBLIC_1H_AUDIT.local.md

      - name: Generate M0 audit revalidation report
        run: |
          PYTHONPATH=src python3 scripts/m0_audit_revalidate.py \
            --public reports/m0/M0_PUBLIC_1H_AUDIT.local.md \
            --raw-root storage/raw \
            --out reports/m0/M0_AUDIT_REVALIDATION_REPORT.md

      - name: Upload sanitized audit reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-public-audit-reports
          path: |
            reports/m0/M0_PUBLIC_1H_AUDIT.local.md
            reports/m0/M0_AUDIT_REVALIDATION_REPORT.md
          if-no-files-found: warn
          retention-days: 7
