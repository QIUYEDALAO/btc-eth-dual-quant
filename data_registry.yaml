{
  "datasets": [
    {
      "name": "spot_klines",
      "source": "Binance Spot",
      "endpoint": ["public_zip:data.binance.vision/spot", "GET /api/v3/klines"],
      "fields": ["open_time", "open", "high", "low", "close", "volume", "quote_volume", "trade_count", "close_time"],
      "granularity": "symbol_interval",
      "history_start": "2017-08-17",
      "retention_limit": null,
      "update_freq": "backfill plus incremental",
      "table": "raw_spot_klines",
      "validations": ["gap_check", "zip_rest_compare", "kline_anomaly"],
      "fallback": ["Binance Public Data monthly/daily ZIP"],
      "consumers": ["trend_signal", "spot_return", "backtest"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "um_futures_klines",
      "source": "Binance USD-M Futures",
      "endpoint": ["public_zip:data.binance.vision/futures/um", "GET /fapi/v1/klines"],
      "fields": ["open_time", "open", "high", "low", "close", "volume", "quote_volume", "trade_count", "close_time"],
      "granularity": "symbol_interval",
      "history_start": "2019-09-01",
      "retention_limit": null,
      "update_freq": "backfill plus incremental",
      "table": "raw_um_futures_klines",
      "validations": ["gap_check", "zip_rest_compare", "kline_anomaly"],
      "fallback": ["Binance Public Data futures/um monthly/daily ZIP"],
      "consumers": ["arbitrage_backtest", "basis", "backtest"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "funding_rate_history",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/fundingRate"],
      "fields": ["symbol", "fundingRate", "fundingTime", "markPrice"],
      "granularity": "funding_period",
      "history_start": "2019-09-01",
      "retention_limit": null,
      "update_freq": "incremental",
      "table": "raw_funding_rate_history",
      "validations": ["gap_check", "funding_interval_check"],
      "fallback": ["premium_index_next_funding_time"],
      "consumers": ["arbitrage_backtest", "crowding_filter", "funding_interval_inference"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "premium_index",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/premiumIndex"],
      "fields": ["markPrice", "indexPrice", "lastFundingRate", "nextFundingTime", "time"],
      "granularity": "snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "polling",
      "table": "raw_premium_index",
      "validations": ["required_fields", "funding_interval_check"],
      "fallback": ["funding_rate_history_time_delta"],
      "consumers": ["funding_interval_inference", "annualized_funding", "arbitrage_entry_exit"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "funding_info",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/fundingInfo"],
      "fields": ["fundingIntervalHours", "adjustedFundingRateCap", "adjustedFundingRateFloor"],
      "granularity": "symbol_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "polling",
      "table": "raw_funding_info",
      "validations": ["required_fields", "funding_interval_check"],
      "fallback": ["premiumIndex.nextFundingTime", "fundingRate.fundingTime"],
      "consumers": ["funding_interval_inference", "annualized_funding"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "mark_price_klines",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/markPriceKlines"],
      "fields": ["open_time", "open", "high", "low", "close", "close_time"],
      "granularity": "symbol_interval",
      "history_start": "2019-09-01",
      "retention_limit": null,
      "update_freq": "incremental",
      "table": "raw_mark_price_klines",
      "validations": ["gap_check", "kline_anomaly"],
      "fallback": ["premium_index.markPrice snapshots"],
      "consumers": ["margin_pressure", "basis_check", "liquidation_risk_research"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "index_price_klines",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/indexPriceKlines"],
      "fields": ["open_time", "open", "high", "low", "close", "close_time"],
      "granularity": "pair_interval",
      "history_start": "2019-09-01",
      "retention_limit": null,
      "update_freq": "incremental",
      "table": "raw_index_price_klines",
      "validations": ["gap_check", "kline_anomaly"],
      "fallback": ["premium_index.indexPrice snapshots"],
      "consumers": ["basis", "premium", "abnormal_price_check"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "premium_index_klines",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/premiumIndexKlines"],
      "fields": ["open_time", "open", "high", "low", "close", "close_time"],
      "granularity": "symbol_interval",
      "history_start": "2019-09-01",
      "retention_limit": null,
      "update_freq": "incremental",
      "table": "raw_premium_index_klines",
      "validations": ["gap_check", "kline_anomaly"],
      "fallback": ["premium_index snapshots"],
      "consumers": ["funding_forecast_research", "basis_state"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "open_interest",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/openInterest", "GET /futures/data/openInterestHist"],
      "fields": ["sumOpenInterest", "sumOpenInterestValue", "timestamp"],
      "granularity": "symbol_period",
      "history_start": null,
      "retention_limit": "approximately 1 month",
      "update_freq": "daily archive plus polling",
      "table": "raw_open_interest",
      "validations": ["archive_completeness", "gap_check"],
      "fallback": ["third_party CoinGlass or self-built archive"],
      "consumers": ["crowding_indicator", "data_quality_report"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "order_book_depth",
      "source": "Binance Spot and USD-M Futures",
      "endpoint": ["GET /api/v3/depth", "GET /api/v3/ticker/bookTicker", "GET /fapi/v1/depth", "GET /fapi/v1/ticker/bookTicker", "WS {symbol}@depth5@100ms"],
      "fields": ["bids_top5", "asks_top5", "bookTicker", "local_received_time"],
      "granularity": "snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "polling in M0, websocket from paper phase",
      "table": "raw_order_book_depth",
      "validations": ["required_fields", "non_crossed_book"],
      "fallback": ["bookTicker when full depth unavailable"],
      "consumers": ["slippage_baseline", "cost_model"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "actual_trades",
      "source": "Binance Spot and USD-M Futures",
      "endpoint": ["GET /api/v3/myTrades", "futures account trades or async download"],
      "fields": ["orderId", "clientOrderId", "price", "qty", "commission", "commissionAsset", "isMaker", "time"],
      "granularity": "trade",
      "history_start": null,
      "retention_limit": "account endpoint retention varies",
      "update_freq": "from M3 live archive",
      "table": "raw_actual_trades",
      "validations": ["archive_completeness", "required_fields"],
      "fallback": ["exchange downloadable account statements"],
      "consumers": ["slippage_audit", "commission_audit", "reconciliation"],
      "phase": "M3",
      "enabled": false
    },
    {
      "name": "account_balances",
      "source": "Binance Spot and USD-M Futures",
      "endpoint": ["GET /api/v3/account", "GET /fapi/v3/account", "GET /fapi/v3/balance"],
      "fields": ["asset", "walletBalance", "availableBalance", "unrealizedPnL", "marginBalance"],
      "granularity": "account_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "from paper/live archive",
      "table": "raw_account_balances",
      "validations": ["archive_completeness", "required_fields"],
      "fallback": ["account statements"],
      "consumers": ["nav", "available_funds", "asset_distribution"],
      "phase": "M2",
      "enabled": false
    },
    {
      "name": "margin_requirements",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v3/account", "GET /fapi/v3/balance"],
      "fields": ["totalMaintMargin", "totalInitialMargin", "availableBalance", "positions"],
      "granularity": "account_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "from paper/live archive",
      "table": "raw_margin_requirements",
      "validations": ["archive_completeness", "required_fields"],
      "fallback": ["account snapshots"],
      "consumers": ["margin_pressure", "short_leg_safety"],
      "phase": "M2",
      "enabled": false
    },
    {
      "name": "funding_income",
      "source": "Binance USD-M Futures",
      "endpoint": ["GET /fapi/v1/income?incomeType=FUNDING_FEE"],
      "fields": ["income", "incomeType", "symbol", "time", "tranId"],
      "granularity": "income_event",
      "history_start": null,
      "retention_limit": "approximately 3 months",
      "update_freq": "daily archive",
      "table": "raw_funding_income",
      "validations": ["archive_completeness", "required_fields"],
      "fallback": ["account statements"],
      "consumers": ["funding_reconciliation", "arbitrage_pnl"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "commissions",
      "source": "Binance Spot and USD-M Futures",
      "endpoint": ["GET /api/v3/account/commission", "GET /fapi/v1/commissionRate"],
      "fields": ["maker", "taker", "discount", "commissionAsset"],
      "granularity": "symbol_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "daily",
      "table": "raw_commissions",
      "validations": ["required_fields", "cost_model_drift"],
      "fallback": ["official fee page manual review"],
      "consumers": ["cost_model", "payback_threshold"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "exchange_rules",
      "source": "Binance Spot and USD-M Futures",
      "endpoint": ["GET /api/v3/exchangeInfo", "GET /fapi/v1/exchangeInfo"],
      "fields": ["tickSize", "stepSize", "minQty", "minNotional", "pricePrecision", "quantityPrecision"],
      "granularity": "symbol_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "startup snapshot plus daily",
      "table": "raw_exchange_rules",
      "validations": ["required_fields", "versioned_snapshot"],
      "fallback": ["official exchange info snapshot archive"],
      "consumers": ["data_quality", "future_execution_design"],
      "phase": "M0",
      "enabled": true
    },
    {
      "name": "exchange_system_status",
      "source": "Binance and manual announcements",
      "endpoint": ["system status endpoint", "manual announcement log"],
      "fields": ["status", "msg", "timestamp"],
      "granularity": "event",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "from paper/live archive",
      "table": "raw_exchange_system_status",
      "validations": ["required_fields"],
      "fallback": ["manual incident log"],
      "consumers": ["halt_new_positions", "risk_monitor"],
      "phase": "M2",
      "enabled": false
    },
    {
      "name": "deposit_withdraw_status",
      "source": "Binance Wallet",
      "endpoint": ["account/wallet coin information endpoint"],
      "fields": ["depositAllEnable", "withdrawAllEnable", "networkList"],
      "granularity": "asset_snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "from paper/live archive",
      "table": "raw_deposit_withdraw_status",
      "validations": ["required_fields"],
      "fallback": ["manual incident log"],
      "consumers": ["exchange_risk_monitor"],
      "phase": "M2",
      "enabled": false
    },
    {
      "name": "usdt_depeg",
      "source": "Binance stablecoin pairs and CoinGecko",
      "endpoint": ["Binance stablecoin pair prices", "CoinGecko Simple Price API"],
      "fields": ["USDT/USD", "USDT/USDC", "last_updated_at", "price_change"],
      "granularity": "snapshot",
      "history_start": null,
      "retention_limit": null,
      "update_freq": "polling from paper/live",
      "table": "raw_usdt_depeg",
      "validations": ["required_fields", "threshold_check"],
      "fallback": ["alternate stablecoin quote sources"],
      "consumers": ["external_risk_halt"],
      "phase": "M2",
      "enabled": false
    },
    {
      "name": "tick_l2_history_optional",
      "source": "Tardis.dev or Kaiko",
      "endpoint": ["paid vendor data"],
      "fields": ["order_book_snapshots", "trades", "funding", "OI", "liquidations"],
      "granularity": "tick_or_snapshot",
      "history_start": null,
      "retention_limit": "vendor dependent",
      "update_freq": "optional purchase",
      "table": "raw_tick_l2_history_optional",
      "validations": ["vendor_schema_check"],
      "fallback": ["no M0 fallback"],
      "consumers": ["execution_research", "slippage_model_optimization"],
      "phase": "optional",
      "enabled": false
    }
  ]
}
